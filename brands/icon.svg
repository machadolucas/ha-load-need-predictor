<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3AC9F5"/>
      <stop offset="1" stop-color="#0A5FCB"/>
    </linearGradient>
  </defs>
  <!-- same app tile as Load Scheduler (full-bleed for brands' trim check) -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- same price bars; the lowest (cheapest) is green -->
  <g>
    <rect x="94"  y="312" width="60" height="96"  rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="182" y="258" width="60" height="150" rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="270" y="338" width="60" height="70"  rx="16" fill="#A9E66B"/>
    <rect x="358" y="288" width="60" height="120" rx="16" fill="#ffffff" fill-opacity="0.9"/>
  </g>
  <!-- predictor accent (derived from the scheduler): a forecast line tracing the
       bars, then projecting (dashed) beyond the horizon to a forecast point -->
  <g fill="none" stroke="#FFC42E" stroke-width="17" stroke-linecap="round" stroke-linejoin="round">
    <path d="M66,300 L124,286 L212,232 L300,312 L388,262"/>
    <path d="M388,262 L456,168" stroke-dasharray="6 30"/>
  </g>
  <circle cx="456" cy="168" r="18" fill="#FFC42E"/>
</svg>
